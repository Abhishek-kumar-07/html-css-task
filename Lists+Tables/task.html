<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List+Table</title>
</head>
<body>
    <ul>
        <li>
           Fruits 
           <ul>
            <li>
                Mango
            </li>
            <li>
                Banana
            </li>
            <li>
                Apple
            </li>
           </ul>
        </li>
    </ul>


   <ol>
    <li>
        Routine
        <ol>
            <li> Woke up</li>
            <li>Got fresh</li>
            <li>Did coding</li>
            <li>Played games</li>
            <li>Worked</li>
        </ol>
    </li>
   </ol>

   <ol>
    <li>
        Fruits
        <ol type = "A">
            <li>Mango </li>
            <li>BananA </li>
        </ol>
    </li>
   </ol>


   <table border="3">
    <tr>
      <th>Name</th>
    
     <th>Age</th> 
  
    <th>City</th>
    </tr>
   </table>
    
</body>
</html>
